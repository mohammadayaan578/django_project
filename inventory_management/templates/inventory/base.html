<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Inventory Management System</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Animations -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>

/* ================= BODY ================= */

body{
background: linear-gradient(135deg,#eef2ff,#f8fafc);
font-family:'Segoe UI',sans-serif;
color:#1e293b;
animation:fadeIn 0.6s ease;
margin:0;
}

/* ================= ANIMATIONS ================= */

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes slideDown{
from{transform:translateY(-20px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

@keyframes cardAppear{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* ================= SIDEBAR ================= */

.sidebar{
position:fixed;
height:100vh;
width:240px;
background:linear-gradient(180deg,#0f172a,#1e293b);
color:white;
padding:25px;
transition:0.3s;
box-shadow:2px 0 20px rgba(0,0,0,0.1);
}

.sidebar h4{
margin-bottom:35px;
font-weight:700;
letter-spacing:1px;
}

.sidebar a{
display:flex;
align-items:center;
gap:12px;
color:#cbd5e1;
padding:12px;
margin-bottom:10px;
text-decoration:none;
border-radius:10px;
transition:0.25s;
font-weight:500;
}

.sidebar a:hover{
background:#334155;
color:white;
transform:translateX(6px);
}

.sidebar a.active{
background:#3b82f6;
color:white;
}

/* ================= CONTENT ================= */

.content{
margin-left:260px;
padding:35px;
}

/* ================= HEADER ================= */

.header{
background:white;
padding:18px 25px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
margin-bottom:30px;
display:flex;
justify-content:space-between;
align-items:center;
animation:slideDown 0.6s ease;
}

.header h5{
font-weight:600;
}

/* ================= USER BADGE ================= */

.user-badge{
background:#f1f5f9;
padding:6px 12px;
border-radius:20px;
font-size:14px;
}

/* ================= STAT CARDS ================= */

.stat-card{
background:white;
border-radius:16px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
border-left:6px solid;
transition:0.35s;
cursor:pointer;
animation:cardAppear 0.6s ease;
}

.stat-card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

/* COLORS */

.card-blue{border-color:#3b82f6;}
.card-red{border-color:#ef4444;}
.card-green{border-color:#22c55e;}

/* TEXT */

.stat-card h1{
font-size:36px;
font-weight:700;
}

/* ================= CHART CARD ================= */

.chart-card{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* ================= TABLE ================= */

table{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

thead{
background:#f1f5f9;
color:#1e293b;
}

/* ================= BUTTON ================= */

.btn-main{
background:#3b82f6;
color:white;
border-radius:10px;
padding:8px 16px;
transition:0.3s;
}

.btn-main:hover{
background:#1e40af;
}

/* ================= SCROLLBAR ================= */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#94a3b8;
border-radius:10px;
}

</style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

<h4><i class="bi bi-box"></i> IMS</h4>

<a href="{% url 'dashboard' %}">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="{% url 'product_list' %}">
<i class="bi bi-box-seam"></i> Products
</a>

<a href="{% url 'supplier_list' %}">
<i class="bi bi-truck"></i> Suppliers
</a>

<a href="{% url 'reports' %}">
<i class="bi bi-bar-chart"></i> Reports
</a>

<a href="{% url 'logout' %}">
<i class="bi bi-box-arrow-right"></i> Logout
</a>

</div>

<!-- ================= CONTENT ================= -->

<div class="content">

<div class="header">

<h5 class="mb-0">Inventory Management Dashboard</h5>

<div class="user-badge">
<i class="bi bi-person-circle"></i> {{ request.user.username }}
</div>

</div>

{% block content %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
