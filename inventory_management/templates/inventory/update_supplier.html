{% extends 'inventory/base.html' %}

{% block content %}

<h3 class="mb-4">Update Supplier</h3>

<div class="card shadow p-4 animate__animated animate__fadeInUp">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" value="{{ supplier.name }}" required>
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone" class="form-control" value="{{ supplier.phone }}" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" value="{{ supplier.email }}">
</div>

<div class="mb-3">
<label>Address</label>
<textarea name="address" class="form-control">{{ supplier.address }}</textarea>
</div>

<button type="submit" class="btn btn-primary">
Update Supplier
</button>

<a href="{% url 'supplier_list' %}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

{% endblock %}
